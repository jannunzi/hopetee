<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HopeTee — Coming Soon</title>
<meta name="description" content="HopeTee documentary — coming soon." />
<link rel="icon" type="image/png" href="../assets/hopetee-logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{--navy:#16264f;--navy-soft:#1e3367;--red:#e1242a;--gold:#f5a800;--ink:#1a1a1a;--muted:#6b7280;--bg:#fff;--bg-alt:#f6f7f9;--line:#e7e9ee;--max:1120px;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh;display:flex;flex-direction:column;}
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;display:block;}
  .wrap{max-width:var(--max);margin:0 auto;padding:0 24px;}

  header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.8);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--line);}
  .nav{display:flex;align-items:center;justify-content:space-between;height:60px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand img{height:34px;width:auto;}
  .nav-right{display:flex;align-items:center;gap:20px;}
  .nav-links{display:flex;gap:26px;font-size:14px;font-weight:500;}
  .nav-links a:hover{color:var(--red);}
  .lang{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;font-size:12px;font-weight:600;}
  .lang button{border:none;background:transparent;padding:6px 12px;cursor:pointer;color:var(--muted);font-weight:600;}
  .lang button.active{background:var(--navy);color:#fff;}
  .nav-cta{background:var(--red);color:#fff;padding:8px 16px;border-radius:999px;font-size:13px;font-weight:600;}

  .back-row{padding:28px 0 0;}
  .back-row a{font-size:14px;font-weight:600;color:var(--muted);}
  .back-row a:hover{color:var(--navy);}

  main{flex:1;display:flex;align-items:center;justify-content:center;}
  .coming{text-align:center;max-width:560px;margin:0 auto;padding:80px 0 100px;}
  .coming .kicker{color:var(--gold);font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-size:13px;margin-bottom:18px;}
  .coming h1{font-size:clamp(40px,7vw,64px);font-weight:800;letter-spacing:-.03em;color:var(--navy);line-height:1.05;}
  .coming p{margin-top:18px;font-size:18px;color:var(--muted);}

  footer{padding:48px 0;border-top:1px solid var(--line);color:var(--muted);font-size:14px;}
  .foot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;}
  .foot img{height:26px;}

  @media(max-width:820px){.nav-links{display:none;}}
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <a class="brand" href="../index.html"><img src="../assets/hopetee-logo.png" alt="HopeTee" /></a>
    <div class="nav-right">
      <nav class="nav-links">
        <a href="../index.html#collections" data-i18n="nav_collections">Collections</a>
        <a href="../index.html#story" data-i18n="nav_story">Our Story</a>
        <a href="../testimonials.html" data-i18n="nav_testimonies">Testimonies</a>
        <a href="../index.html#involved" data-i18n="nav_involved">Get Involved</a>
      </nav>
      <div class="lang" role="group" aria-label="Language">
        <button data-lang="en" class="active">EN</button>
        <button data-lang="es">ES</button>
      </div>
      <a class="nav-cta" href="../index.html#involved" data-i18n="nav_cta">Get Involved</a>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="back-row"><a href="../index.html" data-i18n="back_home">← Back home</a></div>
</div>

<main class="wrap">
  <div class="coming">
    <div class="kicker">HopeTee</div>
    <h1>Coming Soon</h1>
    <p>This page is under construction. Check back soon.</p>
  </div>
</main>

<footer>
  <div class="wrap foot">
    <a class="brand" href="../index.html"><img src="../assets/hopetee-logo.png" alt="HopeTee" /></a>
    <div data-i18n="foot_tag">Wear Hope. Share Hope. · hopetee.org</div>
    <div>© 2026 HopeTee</div>
  </div>
</footer>

<script src="../i18n.js"></script>
</body>
</html>
